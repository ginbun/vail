name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "23 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-rust:
    name: Analyze Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vail-web/package-lock.json

      - name: Build frontend assets for backend embed
        working-directory: vail-web
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Prepare backend web-dist
        run: |
          rm -rf vail-rs/web-dist
          mkdir -p vail-rs/web-dist
          cp -R vail-web/dist/. vail-rs/web-dist/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            libssh2-1-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          build-mode: manual

      - name: Build backend for CodeQL
        working-directory: vail-rs
        run: cargo build --workspace --locked

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
