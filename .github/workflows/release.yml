name: Release

on:
  release:
    types: [published]

jobs:
  verify-release-version:
    name: Verify Release Version
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag format
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "Release tag: ${RELEASE_TAG}"
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must follow semantic version format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

  backend-release-check:
    name: Backend Release Check
    runs-on: ubuntu-latest
    needs: verify-release-version
    defaults:
      run:
        working-directory: vail-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vail-rs

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test --lib

  frontend-release-check:
    name: Frontend Release Check
    runs-on: ubuntu-latest
    needs: verify-release-version
    defaults:
      run:
        working-directory: vail-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vail-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
