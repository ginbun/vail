name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify-release-version:
    name: Verify Release Version
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag format
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "Release tag: ${RELEASE_TAG}"
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must follow semantic version format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

  backend-release-check:
    name: Backend Release Check
    runs-on: ubuntu-latest
    needs: [verify-release-version, frontend-release-check]
    defaults:
      run:
        working-directory: vail-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssh2-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vail-rs

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-release
          path: vail-rs/web-dist

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test --lib

  docker-release:
    name: Build and Publish Backend Image
    runs-on: ubuntu-latest
    needs: backend-release-check
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vail
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: vail-rs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-release-check:
    name: Frontend Release Check
    runs-on: ubuntu-latest
    needs: verify-release-version
    defaults:
      run:
        working-directory: vail-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vail-web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-release
          path: vail-web/dist
