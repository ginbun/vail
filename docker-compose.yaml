name: vail

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: vail
      POSTGRES_PASSWORD: vail
      POSTGRES_DB: vail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vail -d vail"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: vail-rs/Dockerfile
    environment:
      VAIL_CONFIG: /app/config.toml
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:8080"

volumes:
  postgres_data:
